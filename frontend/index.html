<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <title>GisasInventory</title>
</head>

<body>
  <script>
    (function () {
      try {
        const storageKey = "vite-ui-theme";
        const theme = localStorage.getItem(storageKey);
        const supportDarkMode = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const resolvedTheme =
          theme === "dark" || (theme === "system" && supportDarkMode) || (!theme && supportDarkMode)
            ? "dark"
            : "light";

        document.documentElement.classList.remove("light", "dark");
        document.documentElement.classList.add(resolvedTheme);
        document.documentElement.style.backgroundColor = resolvedTheme === "dark" ? "#020617" : "#f8fafc";
        document.documentElement.style.colorScheme = resolvedTheme;
      } catch (e) {
        console.error("Theme script failed", e);
      }
    })();
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
