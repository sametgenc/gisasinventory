api:
  dashboard: false

log:
  level: INFO

accessLog: {}

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  file:
    filename: /etc/traefik/conf/dynamic.yml
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      email: "${LETS_ENCRYPT_EMAIL}"
      storage: /etc/traefik/acme/acme.json
      httpChallenge:
        entryPoint: web
