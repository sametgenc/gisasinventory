api:
  dashboard: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  file:
    filename: /etc/traefik/conf/dynamic.yml

certificatesResolvers:
  letsencrypt:
    acme:
      email: "{{ env "LETS_ENCRYPT_EMAIL" }}"
      storage: /etc/traefik/acme/acme.json
      httpChallenge:
        entryPoint: web
